<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>colorsort</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
  h1 { font-size: 1.3rem; }
  select, button { font-size: 1rem; padding: 0.4rem 0.8rem; margin: 0.2rem; cursor: pointer; }
  #board { display: flex; flex-wrap: wrap; gap: 1rem; margin: 1.5rem 0; }
  .tube { display: flex; flex-direction: column-reverse; border: 3px solid #666; border-radius: 0 0 10px 10px; width: 50px; min-height: 180px; padding: 4px; gap: 4px; background: #1a1a1a; }
  .tube.selected { border-color: #fff; }
  .segment { height: 40px; border-radius: 4px; }
  .tube-label { text-align: center; font-size: 0.8rem; color: #888; margin-top: 0.3rem; }
  .tube-wrap { display: flex; flex-direction: column; align-items: center; }
  #status { margin: 1rem 0; font-weight: bold; min-height: 1.5rem; }
  #status.win { color: #4caf50; }
  #status.stuck { color: #f44336; }
  #status.err { color: #f44336; }
  .controls { margin-bottom: 1rem; }
</style>
</head>
<body>
<h1>colorsort</h1>

<div class="controls">
  <select id="levelSelect"></select>
  <button id="newGameBtn">New game</button>
  <button id="resetBtn">Reset</button>
  <button id="undoBtn">Undo</button>
</div>

<div id="status"></div>
<div id="board"></div>
<p style="color:#888; font-size:0.85rem;">Click a tube to select it as source, click another to pour into it.</p>

<script src="app.js"></script>
</body>
</html>
